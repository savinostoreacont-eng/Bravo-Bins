<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bravo Bins | Telegram Mini App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* CORES EXTRAÍDAS DO LOGO */
            --bravo-red: #cc0000;
            --bravo-red-dark: #800000;
            --bravo-black: #1a1a1a;
            --bg-gradient: linear-gradient(180deg, #ffffff 0%, #f2f2f2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --shadow: 0 10px 30px rgba(204, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ELEMENTO DECORATIVO QUE LEMBRA O LOGO */
        .bg-accent {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(204, 0, 0, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-style: italic; /* Para lembrar a inclinação do logo */
            background: linear-gradient(180deg, var(--bravo-red) 0%, var(--bravo-black) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ÁREA DE BUSCA */
        .search-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(204, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--bravo-red);
            margin-bottom: 10px;
            margin-left: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 18px 22px;
            border-radius: 16px;
            border: 2px solid #eee;
            background: #f9f9f9;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
            color: var(--bravo-black);
        }

        input:focus {
            border-color: var(--bravo-red);
            background: white;
            box-shadow: 0 0 0 4px rgba(204, 0, 0, 0.05);
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--bravo-red) 0%, var(--bravo-red-dark) 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(204, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(204, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* RESULTADOS ESTILIZADOS */
        .results-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--bravo-red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .res-info {
            display: flex;
            flex-direction: column;
        }

        .res-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .res-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--bravo-black);
        }

        .bank-highlight {
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            color: white;
            border-left: 4px solid var(--bravo-red);
        }

        .bank-highlight .res-label { color: rgba(255,255,255,0.6); }
        .bank-highlight .res-value { color: white; }

        /* LOADER */
        .loader {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(204, 0, 0, 0.1);
            border-top: 3px solid var(--bravo-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            color: var(--bravo-red);
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="bg-accent"></div>

    <div class="container">
        <header>
            <div class="logo-text">BRAVO BINS</div>
            <p class="subtitle">Consulte informações de cartões com rapidez</p>
        </header>

        <div class="search-card">
            <span class="input-label">Digite a BIN</span>
            <input type="number" id="binInput" placeholder="456331" pattern="\d*" inputmode="numeric">
            <button onclick="searchBin()">Buscar BIN</button>
            <div id="error" class="error-msg">BIN não encontrada ou inválida.</div>
        </div>

        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">PROCESSANDO...</p>
        </div>

        <div id="results" class="results-container">
            <div class="result-card bank-highlight">
                <div class="res-info">
                    <span class="res-label">Instituição Bancária</span>
                    <span class="res-value" id="res-bank">-</span>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="result-card">
                    <div class="res-info">
                        <span class="res-label">Bandeira</span>
                        <span class="res-value" id="res-scheme">-</span>
                    </div>
                </div>
                <div class="result-card">
                    <div class="res-info">
                        <span class="res-label">Tipo</span>
                        <span class="res-value" id="res-type">-</span>
                    </div>
                </div>
            </div>

            <div class="result-card">
                <div class="res-info">
                    <span class="res-label">Nível do Cartão</span>
                    <span class="res-value" id="res-tier">-</span>
                </div>
            </div>

            <div class="result-card">
                <div class="res-info">
                    <span class="res-label">País de Origem</span>
                    <span class="res-value" id="res-country">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function searchBin() {
            const bin = document.getElementById('binInput').value.trim();
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const error = document.getElementById('error');

            if (bin.length < 6) {
                error.style.display = 'block';
                error.innerText = "Insira ao menos 6 dígitos.";
                return;
            }

            error.style.display = 'none';
            results.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(`https://data.handyapi.com/bin/${bin}`, {
                    headers: { "x-api-key": "HAS-0YI81n6sP24p5dT4wMRb7Y9gk7" }
                });

                const data = await response.json();

                if (data.Status === "SUCCESS" || data.Scheme) {
                    document.getElementById('res-bank').innerText = data.Issuer || 'DESCONHECIDO';
                    document.getElementById('res-scheme').innerText = data.Scheme || 'N/A';
                    document.getElementById('res-type').innerText = data.Type || 'N/A';
                    document.getElementById('res-tier').innerText = data.CardTier || 'N/A';
                    document.getElementById('res-country').innerText = data.Country?.Name || 'N/A';

                    setTimeout(() => {
                        loader.style.display = 'none';
                        results.style.display = 'block';
                        
                        // Animação de cascata nos cards
                        document.querySelectorAll('.result-card').forEach((card, i) => {
                            card.style.opacity = 0;
                            card.style.transform = 'translateX(-10px)';
                            setTimeout(() => {
                                card.style.transition = 'all 0.4s ease';
                                card.style.opacity = 1;
                                card.style.transform = 'translateX(0)';
                            }, i * 80);
                        });
                    }, 500);
                } else {
                    throw new Error();
                }
            } catch (err) {
                loader.style.display = 'none';
                error.style.display = 'block';
                error.innerText = "BIN não encontrada na base.";
            }
        }

        // Suporte ao Enter
        document.getElementById('binInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBin();
        });
    </script>
</body>
</html>
